tools:
  blender: "/Applications/Blender.app/Contents/MacOS/Blender"
  rhubarb: "/Users/abhilaksh/Projects/3D Model/Rhubarb-Lip-Sync-1.14.0-macOS/rhubarb"
  ffmpeg: "/opt/homebrew/bin/ffmpeg"

tts:
  engine: kokoro
  voice: af_bella
  speed: 1.0
  sample_rate: 24000
  lang_code: a

render:
  fps: 30
  resolution: [1920, 1080]
  engine: BLENDER_EEVEE_NEXT
  placeholder_frame_count: 90

render_profiles:
  preview:
    fps: 12
    resolution: [960, 540]
    render_quality: draft
    render_samples: 4
    disable_shadows: true
    camera_resolution_scale: 1.0
    export_mode: combined
    use_per_camera_resolution: true
  production:
    fps: 24
    resolution: [1920, 1080]
    camera_resolution_scale: 2.0
    export_mode: native_segments
    use_per_camera_resolution: true

test_mode: false

# Browser renderer settings. The active SynthPost CC4 runtime is selected with
# renderer="rocketbox" for compatibility, even though it now uses a custom
# Three.js/Reallusion driver rather than Rocketbox assets.
# Set AVATAR_ENGINE_ALLOW_RENDERER_FALLBACK=1 to allow Blender fallback on failure.
# Set AVATAR_ENGINE_ALLOW_2D_FACE_FALLBACK=1 to allow legacy 2D face mode.
talkinghead:
  # The web_avatar_runtime is built automatically if dist/ is missing.
  # Set to false to disable auto-build (requires manual: cd web_avatar_runtime && npm ci && npm run build)
  auto_build_runtime: true
  # Browser capture timeout padding beyond clip duration (seconds)
  browser_timeout_padding_s: 90
  # Playwright browser to use: chromium, firefox, or webkit
  playwright_browser: chromium
  # Avatar asset base path (relative to repo root)
  default_avatar_asset: assets/avatars/synthpost_anchor_v1/anchor.glb
  default_avatar_metadata: assets/avatars/synthpost_anchor_v1/avatar.json
